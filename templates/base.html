<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>{% block title %}Sentient — Emotion Analyzer{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#fcf8f8",
            "surface-dim": "#dcd9d9",
            "surface-bright": "#fcf8f8",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f6f3f2",
            "surface-container": "#f1edec",
            "surface-container-high": "#ebe7e7",
            "surface-container-highest": "#e5e2e1",
            "on-surface": "#1c1b1b",
            "on-surface-variant": "#444749",
            "inverse-surface": "#313030",
            "inverse-on-surface": "#f3f0ef",
            "outline": "#747879",
            "outline-variant": "#c4c7c8",
            "primary": "#5c5f60",
            "on-primary": "#ffffff",
            "primary-container": "#f8f9fa",
            "on-primary-container": "#707273",
            "primary-fixed": "#e1e3e4",
            "primary-fixed-dim": "#c5c7c8",
            "inverse-primary": "#c5c7c8",
            "secondary": "#4648d4",
            "on-secondary": "#ffffff",
            "secondary-container": "#6063ee",
            "on-secondary-container": "#fffbff",
            "secondary-fixed": "#e1e0ff",
            "secondary-fixed-dim": "#c0c1ff",
            "tertiary": "#625e59",
            "on-tertiary": "#ffffff",
            "error": "#ba1a1a",
            "on-error": "#ffffff",
            "error-container": "#ffdad6",
            "background": "#fcf8f8",
            "on-background": "#1c1b1b",
          },
          borderRadius: {
            "sm": "0.25rem",
            "DEFAULT": "0.5rem",
            "md": "0.75rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px",
          },
          spacing: {
            "container-padding": "1.5rem",
            "stack-gap": "1rem",
            "section-gap": "2.5rem",
            "input-padding": "1.25rem",
          },
          fontSize: {
            "display": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg": ["28px", { lineHeight: "34px", letterSpacing: "-0.01em", fontWeight: "600" }],
            "headline-lg-mobile": ["24px", { lineHeight: "30px", fontWeight: "600" }],
            "body-xl": ["20px", { lineHeight: "30px", fontWeight: "400" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "label-sm": ["13px", { lineHeight: "18px", letterSpacing: "0.03em", fontWeight: "600" }],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-color: #fcf8f8;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: max(884px, 100dvh);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(229, 231, 235, 0.5);
    }
    .soft-shadow { box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05); }
    .emotion-bar { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    textarea::-webkit-scrollbar { width: 4px; }
    textarea::-webkit-scrollbar-thumb { background: #e5e2e1; border-radius: 10px; }
    .transition-custom { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .nav-active { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="text-on-surface antialiased pb-24">

  <!-- Top App Bar -->
  <header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md shadow-sm border-b border-outline-variant/30">
    <div class="flex items-center justify-between px-container-padding h-16 max-w-[600px] mx-auto w-full">
      <a href="/" class="flex items-center gap-2 active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-secondary">bubble_chart</span>
        <span class="text-xl font-bold tracking-tight text-secondary" style="font-size:22px;letter-spacing:-0.02em;font-weight:700;">Sentient</span>
      </a>
      <div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant cursor-pointer hover:opacity-80 transition-opacity flex items-center justify-center">
        <span class="material-symbols-outlined text-primary text-xl">person</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="pt-20 max-w-[600px] mx-auto px-container-padding">
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 bg-surface/90 border-t border-outline-variant backdrop-blur-xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
    <div class="flex justify-around items-center h-16 max-w-[600px] mx-auto px-4">
      <a href="/"
         class="flex flex-col items-center justify-center px-5 py-1 rounded-full active:scale-90 transition-all duration-200
                {% if request.resolver_match.url_name == 'index' %}bg-secondary-fixed text-on-surface{% else %}text-on-surface-variant opacity-70 hover:opacity-100{% endif %}">
        <span class="material-symbols-outlined {% if request.resolver_match.url_name == 'index' %}nav-active{% endif %}">psychology</span>
        <span class="font-label-sm text-label-sm">Analyze</span>
      </a>
      <a href="/history/"
         class="flex flex-col items-center justify-center px-5 py-1 rounded-full active:scale-90 transition-all duration-200
                {% if request.resolver_match.url_name == 'history' %}bg-secondary-fixed text-on-surface{% else %}text-on-surface-variant opacity-70 hover:opacity-100{% endif %}">
        <span class="material-symbols-outlined {% if request.resolver_match.url_name == 'history' %}nav-active{% endif %}">history</span>
        <span class="font-label-sm text-label-sm">History</span>
      </a>
    </div>
  </nav>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
